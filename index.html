<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX da Anne Karoline</title>
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; /* Ajustado para o rodapé ficar embaixo */
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: radial-gradient(circle, #ffffff 60%, #fff0f5 100%);
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(220, 20, 114, 0.15); 
            text-align: center; 
            border: 2px solid #DC1472;
            max-width: 320px;
            width: 90%;
        }
        h2 {
            color: #DC1472;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #5d2838;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }
        button { 
            background-color: #DC1472; 
            color: white; 
            border: none; 
            padding: 18px 30px; 
            font-size: 1.1rem; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold;
            width: 100%;
        }
        button:active {
            transform: scale(0.98);
        }
        #msg {
            margin-top: 15px; 
            color: #DC1472;
            font-weight: bold;
            height: 20px; /* Evita que o card pule quando a msg aparece */
        }
        /* Estilo do seu Rodapé */
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #a37c88;
        }
        .footer a {
            color: #DC1472;
            text-decoration: none;
            font-weight: bold;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h2>Presente para a Anne</h2>
    <p>Para sua facilidade, clique no botão para copiar a chave PIX:</p>
    <button id="btn" onclick="copiar()">Copiar Chave PIX</button>
    <p id="msg"></p>
</div>

<div class="footer">
    Desenvolvido por <br>
    <strong>Moesyo Reis (KingsMboy)</strong><br>
    <a href="https://www.instagram.com/moesyo.reis/" target="_blank">@moesyo.reis</a>
</div>

<script>
    function copiar() {
        const chave = "88992212752";
        navigator.clipboard.writeText(chave).then(() => {
            const btn = document.getElementById("btn");
            const msg = document.getElementById("msg");
            
            msg.innerText = "✅ Chave copiada!";
            btn.innerText = "Copiado!";
            
            setTimeout(() => {
                msg.innerText = "";
                btn.innerText = "Copiar Chave PIX";
            }, 3000);
        }).catch(err => {
            const msg = document.getElementById("msg");
            msg.innerText = "Chave: " + chave;
        });
    }
</script>

</body>
</html>
