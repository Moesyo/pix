<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copiar PIX</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { background-color: #32BCAD; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Pagamento PIX</h2>
        <p>Clica abaixo para copiar a chave:</p>
        <button onclick="copiar()">Copiar Chave PIX</button>
        <p id="msg" style="color: green; margin-top: 10px;"></p>
    </div>
    <script>
        function copiar() {
            navigator.clipboard.writeText("88992212752");
            document.getElementById("msg").innerText = "✅ Copiado!";
        }
    </script>
</body>
</html>
